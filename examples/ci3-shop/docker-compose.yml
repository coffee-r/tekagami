services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: digshop
      APP_USER_PASSWORD: digshop
    ports:
      - "1521:1521"
    volumes:
      - ./docker/oracle/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 40

  web:
    build:
      context: ../..
      dockerfile: examples/ci3-shop/docker/php/Dockerfile
    environment:
      DIGSHOP_DB_USER: digshop
      DIGSHOP_DB_PASSWORD: digshop
      DIGSHOP_DB_CONNECT: oracle:1521/FREEPDB1
      TEKAGAMI_LOG: /var/www/html/var/tekagami.jsonl
      TEKAGAMI_SECRET: local-e2e-secret
    ports:
      - "8088:80"
    volumes:
      - ./var:/var/www/html/var
    depends_on:
      oracle:
        condition: service_healthy
